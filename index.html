<!DOCTYPE html>
<html lang="cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>耶</title>
    <style>
        html, body {
            margin: 0;
            padding: 0%;
            height: 100%;
            font-family: "Microsoft YaHei", sans-serif;
            overflow: hidden;
        }

        .hero {
            position: relative;
            height: 100vh;
            background-image: url(bg.png);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: white;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero::before {
            content: " ";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
            padding: 20px;
        }

        .hero h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            position: relative;
            top: -10px;
            bottom: 100px;
            color: rgb(202, 202, 219);
            text-shadow: none;
            transition: text-shadow 2s ease;
        }

        h1:hover {
            text-shadow: 2px 2px 0px rgba(246, 243, 243, 0.915);
            color: rgba(255, 255, 255, 0.159);
            text-decoration: underline;
        }

        .hero p {
            font-size: 2rem;
            color: #f5f6f5eb;
        }

        .ps {
            position: absolute;
            bottom: 30px;
            right: 0px;
            margin: 0px;
            text-align: right;
            width: 300px;
            font-size: 14px;
            z-index: 10;
        }

        a {
            color: white;
            text-decoration: none;
            font-size: 20px;
        }

        a:hover {
            text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.5);
            color: aliceblue;
        }

        /* ========== 启动按钮样式 ========== */
        #an {
            padding: 16px 48px;
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #1e60f0, #bad2b3);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            letter-spacing: 4px;
            transition: all 0.3s ease;
            box-shadow: 0 6px 24px rgba(35, 230, 9, 0.5);
            position: relative;
            overflow: hidden;
        }

        #an:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 10px 32px rgba(35, 9, 230, 0.7);
        }

        #an:active {
            transform: scale(0.95);
        }

        /* ========== Canvas 花朵层 ========== */
        #flowerCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 100;
            pointer-events: none;
        }

        /* ========== 模态弹窗（表格） ========== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.6);
            z-index: 200;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-box {
            background: linear-gradient(160deg, #ffffff, #f0fff0);
            border: 3px solid #f2f3f2;
            border-radius: 20px;
            padding: 32px 28px;
            width: 90%;
            max-width: 650px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(35, 230, 9, 0.35);
            transform: translateY(40px) scale(0.9);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .modal-overlay.active .modal-box {
            transform: translateY(0) scale(1);
        }

        .modal-box h2 {
            margin-top: 0;
            color: #eff5ee;
            text-align: center;
            font-size: 1.6rem;
            border-bottom: 2px dashed #f2f3f2;
            padding-bottom: 12px;
        }

        /* 关闭按钮 */
        .modal-close {
            position: absolute;
            top: 12px;
            right: 20px;
            font-size: 28px;
            color: #888;
            cursor: pointer;
            transition: color 0.2s;
            background: none;
            border: none;
        }
        .modal-close:hover {
            color: #e8eae8;
        }

        /* ========== 表格样式（留给你自定义） ========== */
        .modal-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }

        .modal-table th,
        .modal-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #d4f5c8;
        }

        .modal-table thead th {
            color: white;
            font-weight: bold;
            border-radius: 4px 4px 0 0;
        }

        .modal-table tbody tr:hover {
            background: rgba(35, 230, 9, 0.08);
        }
        .modal-table tbody td {
            color: #333;
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="hero-content">
            <h1>欢迎来到我的网站</h1>
            <button id="an">启动吧</button>
        </div>
        <div class="ps">
            我以后会在这个网站上面更新我的一些日常以及练习个人的编程技术，
            在构建这个网站的过程中我将使用原古手敲加上vibe coding的办法完成该网站的创建以及完善
        </div>
    </div>

    
</body>
</html>
